name: agentic_porter
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11 # Adjust Python version if needed
  - nodejs      # Includes npm for JS dependencies
  - pip
  - pip:
    # Core AI/ML
    - tf-keras>=2.21.0
    - torch>=2.1.0
    - numpy>=1.23.0,<2.0.0
    - onnxruntime>=1.19.0
    - openai>=1.83.0
    #- sentence_transformers>=5.4.0
    - transformers>=4.40.0
    
    # Google/Auth
    - google-api-python-client>=2.118.0,<3.0.0
    - google-auth-oauthlib>=1.2.0,<2.0.0
    - googleapis-common-protos>=1.70.0,<2.0.0
    - protobuf>=5.29.5,<6.0.0
    
    # Agentic/LangChain
    - crewai==1.14.4
    - crewai-tools==1.14.4
    - langchain>=1.2.1
    - langchain-openai>=1.2.1
    - langchain-mongodb==0.11.0
    - langchain-groq==1.1.2
    
    # Web/API
    - fastapi>=0.116.1
    - uvicorn>=0.46.0
    - Flask>=3.0.0
    - flask-cors>=6.0
    
    # DB/Storage
    - pymongo>=4.6.1
    - neo4j>=5.14.0,<5.28.3
    - weaviate>=0.1.2
    - chromadb~=1.1.0
    
    # Utilities
    - pydantic>=2.0.0
    - python-dotenv>=1.2.2
    - arxiv>=2.1.3
    - pymupdf~=1.26.6
    - PyJWT>=2.10.1
