name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 18 * * 1' # Runs every Monday at 18:30 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Initialize CodeQL
      uses: 'github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26' # ratchet:github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Exclude node_modules or third-party dependencies from scanning
        config: |
          paths-ignore:
            - 'node_modules/**'
            - '.venv/**'

    - name: Autobuild
      uses: github/codeql-action/autobuild@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.26.3

    - name: Perform CodeQL Analysis
      uses: 'github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26' # ratchet:github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
