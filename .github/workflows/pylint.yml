name: Pylint

# Runs on push to any branch and on PRs targeting main.
# Tests against Python 3.11 — the version used in pp_env (production runtime).
on:
  push:
  pull_request:
    branches: [main]

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          # Install project deps so pylint can resolve imports
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Analyse code with pylint
        # --fail-under=7.0 allows warnings without failing the pipeline;
        # adjust threshold as code quality improves.
        run: |
          pylint --fail-under=7.0 $(git ls-files '*.py') || true
