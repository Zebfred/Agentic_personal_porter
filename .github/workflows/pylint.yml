name: Pylint

# Runs on push to main and OVERHAUL/* branches, and on PRs targeting main.
# Tests against Python 3.12 — the version used in pp_env (production runtime).
on:
  push:
    branches:
      - main
      - 'OVERHAUL/*'
  pull_request:
    branches: [main]

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Analyse code with pylint
        # --fail-under=6.0 blocks merges with critical quality issues;
        # tighten this threshold as code quality improves.
        run: |
          uv run pylint --fail-under=6.0 $(git ls-files '*.py')
