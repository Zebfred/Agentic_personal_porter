name: Pytest Verification

on:
  push:
    branches:
      - main
      - OVERHAUL/MACH3
  pull_request:
    branches:
      - main
      - OVERHAUL/MACH3

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-activate-base: false
        activate-environment: agentic_porter
        python-version: '3.11'
        
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        
    - name: Install Dependencies
      shell: bash -el {0}
      env:
        UV_PROJECT_ENVIRONMENT: ${{ env.CONDA_PREFIX }}
      run: |
        uv sync --locked --dev
        
    - name: Run Pytest
      shell: bash -el {0}
      run: |
        # Using the standard test suite execution
        # Environment variables are managed inside tests where applicable
        uv run pytest tests/ --ignore=tests/billing_killswitch/ -v --tb=short
