# =============================================================================
# Secret Scanning Workflow
#
# Uses Gitleaks to prevent accidental publication of secrets, API keys,
# tokens, passwords, private keys, and other sensitive data to the public repo.
#
# Runs on:
#   - Every push (scans the diff)
#   - Every pull request (scans the diff)
#   - Weekly schedule (full repo scan to catch anything that slipped through)
# =============================================================================
name: Secret Scanning

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly full scan: Sunday at 03:00 UTC
    - cron: '0 3 * * 0'

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for diff-based scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For push/PR events, scans only the diff (fast).
          # For scheduled events, scans full repo history (thorough).
          GITLEAKS_ENABLE_COMMENTS: true

  # Secondary check: grep-based scan for project-specific patterns
  # that Gitleaks' generic rules might miss.
  custom-pattern-scan:
    name: Custom Secret Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for hardcoded secret patterns
        run: |
          echo "=== Scanning for project-specific secret patterns ==="
          FOUND=0

          # Pattern 1: Hardcoded API keys (common prefixes)
          echo "--- Checking for hardcoded API keys ---"
          if grep -rn --include='*.py' --include='*.js' --include='*.html' --include='*.sh' \
            -E '(gsk_|sk-[a-zA-Z0-9]{20,}|AIza[a-zA-Z0-9_-]{35}|ghp_[a-zA-Z0-9]{36}|glpat-[a-zA-Z0-9_-]{20,})' \
            --exclude-dir='.git' --exclude-dir='node_modules' --exclude-dir='.legacy_hr' \
            --exclude-dir='__pycache__' . ; then
            echo "::error::Potential hardcoded API key detected!"
            FOUND=1
          fi

          # Pattern 2: Hardcoded passwords or secrets in assignment
          echo "--- Checking for hardcoded password assignments ---"
          if grep -rn --include='*.py' --include='*.js' \
            -iE "(password|secret|api_key|apikey|auth_token)\s*=\s*['\"][^'\"]{8,}['\"]" \
            --exclude-dir='.git' --exclude-dir='node_modules' --exclude-dir='.legacy_hr' \
            --exclude-dir='__pycache__' --exclude-dir='tests' . ; then
            echo "::warning::Possible hardcoded secret in assignment. Verify these are not real credentials."
            FOUND=1
          fi

          # Pattern 3: Private key blocks
          echo "--- Checking for private key material ---"
          if grep -rn \
            -E '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----' \
            --exclude-dir='.git' --exclude-dir='node_modules' --exclude-dir='.legacy_hr' \
            --exclude-dir='__pycache__' . ; then
            echo "::error::Private key material detected in repository!"
            FOUND=1
          fi

          # Pattern 4: .env files that shouldn't be committed
          echo "--- Checking for .env files in tracked sources ---"
          if git ls-files | grep -E '\.env$|\.env\.' | grep -v '.gitignore'; then
            echo "::error::.env file is tracked by git!"
            FOUND=1
          fi

          # Pattern 5: Files in .auth/ directory being tracked
          echo "--- Checking for .auth/ files in git ---"
          if git ls-files | grep '^\.auth/'; then
            echo "::error::Files from .auth/ directory are tracked by git!"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "::error::Secret scan found potential issues. Review the output above."
            exit 1
          else
            echo "✅ No secret patterns detected."
          fi

      - name: Verify .gitignore protections
        run: |
          echo "=== Verifying .gitignore covers sensitive paths ==="
          MISSING=0

          for pattern in ".auth/" ".*env*" "*cred*" "token.pickle" "token.json"; do
            if ! grep -qF "$pattern" .gitignore; then
              echo "::error::Missing .gitignore rule for: $pattern"
              MISSING=1
            fi
          done

          if [ $MISSING -eq 1 ]; then
            echo "::error::.gitignore is missing critical exclusion patterns!"
            exit 1
          else
            echo "✅ .gitignore contains all required exclusion patterns."
          fi
