services:
  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-service
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    env_file:
      - .auth/.env
    volumes:
      # Mount data directory for persistent vector store
      - ./data:/app/data
      # Mount .env file if it exists
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rag-network

  redis:
    image: redis:7-alpine
    container_name: porter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - rag-network

  porter-workers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: porter-workers
    command: python -m src.events.workers
    env_file:
      - .auth/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  redis-data:
