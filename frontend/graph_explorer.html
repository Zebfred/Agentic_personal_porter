<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Explorer - Agentic Personal Porter</title>
    <link href="./css/style.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        #network-container {
            width: 100%;
            height: 70vh;
            border-radius: 0.5rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-gray-800 p-4 text-white shadow-md z-10 sticky top-0">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">Agentic Personal Porter</h1>
            <div class="space-x-4 text-sm font-medium" id="main-nav">
                <a href="/index.html" class="hover:text-blue-300 transition">Hub</a>
                <a href="/adventure_log" class="hover:text-blue-300 transition">Adventure Log</a>
                <a href="/inventory.html" class="hover:text-blue-300 transition">Inventory</a>
                <a href="/artifacts.html" class="hover:text-blue-300 transition">Artifacts</a>
                <a href="/journal_review" class="hover:text-blue-300 transition">Journal Review</a>
                <a href="/oracle_predictions" class="hover:text-blue-300 transition">Oracle</a>
                <a href="/graph_explorer.html" class="text-blue-400 font-bold border-b-2 border-blue-400 pb-1">Graph Map</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
        <header class="mb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-2">Identity Graph</h2>
                <p class="text-gray-600">A visual constellation of your actions, intents, and life events.</p>
            </div>
            <div class="flex gap-2">
                <button id="refresh-graph-btn" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-800 font-semibold py-2 px-4 rounded shadow-sm transition">
                    🔄 Refresh
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Left Column: Graph Visualization -->
            <div class="lg:col-span-3">
                <section class="glass-panel p-4 rounded-xl shadow-lg">
                    <div id="loading-indicator" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white p-4 rounded shadow-xl z-20">
                        <p class="font-bold text-blue-600">Loading Nodes...</p>
                    </div>
                    <div id="network-container"></div>
                </section>
            </div>

            <!-- Right Column: Node Inspector -->
            <div class="space-y-6">
                <section class="glass-panel p-6 rounded-xl shadow-lg h-full">
                    <h3 class="text-xl font-bold text-gray-800 border-b pb-2 mb-4">Node Inspector</h3>
                    
                    <div id="node-details" class="text-sm">
                        <p class="text-gray-500 italic">Click on any node in the graph to view its details.</p>
                    </div>
                    
                    <!-- Filters section -->
                    <div class="mt-8 border-t pt-4">
                        <h4 class="font-bold text-gray-700 mb-2">Filters</h4>
                        <div class="space-y-2 text-sm" id="graph-filters">
                            <label class="flex items-center gap-2">
                                <input type="checkbox" checked value="Intention" class="rounded text-blue-600"> Intentions
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" checked value="Actual" class="rounded text-blue-600"> Actuals
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" checked value="TimeChunk" class="rounded text-blue-600"> TimeChunks
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" checked value="Day" class="rounded text-blue-600"> Days
                            </label>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="./js/auth.js"></script>
    <script type="module" src="./js/graph_explorer.js"></script>
</body>
</html>
