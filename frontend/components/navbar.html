<!-- Navbar -->
<div id="impersonation-banner" class="bg-error text-on-primary text-center text-sm font-bold p-1 hidden cursor-pointer hover:opacity-90 transition" onclick="Auth.logout()">
    🛑 You are currently Impersonating a User (Shadow State). Click here to return to Admin Hub.
</div>
<nav class="bg-nav p-4 text-surface shadow-md z-10 sticky top-0">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight">Agentic Personal Porter</h1>
        <div class="space-x-4 text-sm font-medium flex items-center">
            <a href="/" class="{% if request.path in ['/', '/index.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Hub</a>
            <a href="/adventure_log" class="{% if request.path in ['/adventure_log', '/Adventure_Time_log.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Adventure Log</a>
            <a href="/adventure_calendar" class="{% if request.path in ['/adventure_calendar', '/adventure_calendar.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Calendar</a>
            <a href="/inventory.html" class="{% if request.path in ['/inventory', '/inventory.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Inventory</a>
            <a href="/artifacts.html" class="{% if request.path in ['/artifacts', '/artifacts.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Artifacts</a>
            <a href="/journal_review" class="{% if request.path in ['/journal_review', '/journal_review.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Journal Review</a>
            <a href="/oracle_predictions" class="{% if request.path in ['/oracle_predictions', '/Oracle_predictions.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Oracle</a>
            <a href="/profile" class="{% if request.path in ['/profile', '/profile.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Profile</a>
            
            <a href="/graph_explorer" class="{% if request.path in ['/graph_explorer', '/graph_explorer.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">Graph Map</a>
            
            <!-- Admin Only Feature -->
            <div id="admin-features" class="border-l border-border pl-4 ml-2 flex items-center space-x-3 hidden">
                <a href="/admin_index" class="{% if request.path in ['/admin_index', '/admin_index.html'] %}text-secondary font-bold border-b-2 border-secondary pb-1{% else %}text-muted hover:text-surface transition{% endif %}">
                    ⚡ Admin Hub
                </a>
            </div>
        </div>
    </div>
</nav>

<script>
    // Unlock features if logged in as admin
    document.addEventListener('DOMContentLoaded', () => {
        const role = sessionStorage.getItem('porter_role');
        if (role === 'admin') {
            const adminFeatures = document.getElementById('admin-features');
            if(adminFeatures) {
                adminFeatures.classList.remove('hidden');
            }
        }
        
        if (sessionStorage.getItem('is_impersonation')) {
            const banner = document.getElementById('impersonation-banner');
            if (banner) banner.classList.remove('hidden');
        }
    });
</script>
