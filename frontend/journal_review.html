<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal Review - Agentic Personal Porter</title>
    <link href="./css/style.css" rel="stylesheet">
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">
    <!-- Navbar -->
    {% include 'components/navbar.html' %}

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="glass-panel p-8 rounded-2xl max-w-5xl mx-auto">
            <div class="flex justify-between items-end mb-6 border-b pb-4 border-gray-200">
                <div>
                    <h2 class="text-3xl font-extrabold text-gray-800">Historical Journal Review</h2>
                    <p class="text-gray-600 italic mt-1">Review past reflections, classify detours, and push truthful records directly to Google Calendar.</p>
                </div>
                <!-- Date Picker -->
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center gap-3">
                    <label for="date-picker" class="font-bold text-gray-700 text-sm cursor-pointer">Target Date:</label>
                    <input type="date" id="date-picker" class="border p-2 rounded focus:ring-2 focus:ring-indigo-400 outline-none text-sm font-medium cursor-pointer">
                    <button id="load-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition-colors text-sm shadow">Analyze</button>
                </div>
            </div>

            <div id="focus-container" class="mb-6">
                <!-- Fog of War Alerts will inject here -->
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                <!-- Intentions Left Column -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 opacity-80">
                    <h3 class="font-bold text-gray-800 text-lg border-b pb-2 mb-4 flex items-center gap-2"><span>🎯</span> Intentions (Hero Ambition)</h3>
                    <div id="intent-list" class="space-y-2">
                        <div class="animate-pulse flex space-x-4"><div class="h-4 bg-gray-200 rounded w-3/4"></div></div>
                    </div>
                </div>

                <!-- Actuals Right Column -->
                <div class="bg-gray-50 rounded-xl shadow-inner border border-gray-300 p-6 relative">
                    <div class="absolute top-0 right-0 -tr-xl -mr-4 -mt-4">
                        <span class="bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg border-2 border-white">Source of Truth</span>
                    </div>
                    <h3 class="font-bold text-gray-800 text-lg border-b border-gray-300 pb-2 mb-4 flex items-center gap-2"><span>⏱️</span> Actual Events (Mongo Timeseries)</h3>
                    <div id="actual-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                        <div class="animate-pulse flex space-x-4"><div class="h-10 bg-gray-300 rounded w-full"></div></div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <script src="./js/auth.js"></script>
    <script src="./js/journal_review.js"></script>
</body>
</html>
