<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/css/index.css" rel="stylesheet">
</head>
<body class="bg-background text-surface min-h-screen font-sans">
    
    <!-- Navbar -->
    {% include 'components/navbar.html' %}

    <main class="container mx-auto px-4 py-8">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-primary mb-2 tracking-tight">Adventure Journal</h1>
            <p class="text-muted text-lg max-w-2xl mx-auto">Record your daily freeform thoughts, reflections, and track your high-level weekly expectations.</p>
        </header>
        
        <div class="max-w-4xl mx-auto space-y-8">
            <!-- Weekly Expectations Card -->
            <div class="bg-gradient-to-br from-indigo-50 to-blue-50 p-6 rounded-2xl shadow-md border border-indigo-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-indigo-900 flex items-center gap-2">
                        <span>🎯</span> Weekly Expectation
                    </h3>
                    <div class="flex items-center gap-4">
                        <span id="active-week-label" class="inline-block bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider"></span>
                        <button id="save-weekly-expectation-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 px-4 rounded-lg shadow-sm transition active:scale-95 text-sm">
                            Save Expectation
                        </button>
                    </div>
                </div>
                <div id="weekly-expectation-last-saved" class="text-sm text-gray-500 mb-2 font-medium hidden"></div>
                <textarea id="weekly-expectation-text" rows="3" class="w-full bg-white border border-indigo-200 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-gray-700" placeholder="Set your high-level aim for this week. What does success look like across your pillars?"></textarea>
                <div id="weekly-expectation-status" class="hidden text-green-600 font-bold text-sm mt-2 animate-pulse">
                    Expectation saved ✅
                </div>
            </div>

            <!-- Daily Freeform Journal -->
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                        <span>📝</span> Daily Reflection
                    </h3>
                    <div class="flex items-center gap-4">
                        <input type="date" id="journal-date-picker" class="border border-gray-300 rounded-lg p-1.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <button id="save-journal-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 px-4 rounded-lg shadow-sm transition active:scale-95 text-sm flex items-center gap-2">
                            <span>💾</span> Save Journal
                        </button>
                    </div>
                </div>
                <div id="daily-journal-last-saved" class="text-sm text-gray-500 mb-2 font-medium hidden"></div>
                <textarea id="daily-journal-text" rows="15" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-4 focus:ring-2 focus:ring-blue-500 outline-none text-gray-800 font-medium" placeholder="Write your thoughts for the day..."></textarea>
                <div id="journal-status" class="hidden text-green-600 font-bold text-sm mt-2 animate-pulse">
                    Journal saved ✅
                </div>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/journal.js"></script>
</body>
</html>
