<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact Builder - Life's Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for interactions */
        input, textarea, button { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
    <nav class="bg-gray-800 p-4 text-white shadow-xl relative z-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wide bg-gradient-to-r from-amber-200 to-amber-500 bg-clip-text text-transparent">Artifact Builder</h1>
            <div class="flex space-x-6 font-semibold">
                <a href="index.html" class="hover:text-amber-400 transition-colors duration-200 flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> Home
                </a>
                <a href="inventory.html" class="hover:text-amber-400 transition-colors duration-200 flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg> Inventory
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 max-w-5xl">
        <div class="mb-10 text-center">
            <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4 tracking-tight drop-shadow-sm">Hero Artifacts</h2>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto leading-relaxed">Shape the foundational blueprints of your character. The structure below forms your unique Origin and profound Ambitions.</p>
        </div>
        
        <div class="flex flex-wrap justify-center gap-6 mb-10">
            <button id="tab-origin" class="px-8 py-3 rounded-full font-bold text-lg bg-indigo-600 text-white shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-indigo-300">
                Origin Story
            </button>
            <button id="tab-ambition" class="px-8 py-3 rounded-full font-bold text-lg bg-white text-gray-700 border-2 border-transparent shadow-md hover:bg-gray-50 hover:shadow-lg hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-gray-300">
                Ambition & Intent
            </button>
        </div>

        <div id="loading" class="text-center py-20 hidden">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="mt-4 text-indigo-600 font-semibold text-lg animate-pulse">Synchronizing Data...</p>
        </div>

        <div id="error-message" class="hidden transform transition-all bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-8 rounded-r shadow-md" role="alert">
            <div class="flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="font-bold text-lg">Error Encountered</p>
            </div>
            <p id="error-text" class="mt-1 ml-8">Failed to load artifact.</p>
        </div>

        <div id="success-message" class="hidden transform transition-all bg-emerald-50 border-l-4 border-emerald-500 text-emerald-700 p-4 mb-8 rounded-r shadow-md" role="alert">
            <div class="flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="font-bold text-lg">Knowledge Embedded</p>
            </div>
            <p id="success-text" class="mt-1 ml-8">Artifact saved successfully.</p>
        </div>

        <div id="form-container" class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-6 md:p-10 border border-gray-100">
            <!-- Form structurally injected here -->
        </div>
        
        <div class="mt-10 mb-20 flex justify-end">
            <button id="save-btn" class="hidden flex items-center gap-2 px-10 py-4 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-black text-lg rounded-xl shadow-lg hover:shadow-emerald-500/40 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-emerald-300 transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                COMMIT CHANGES
            </button>
        </div>
    </div>

    <script src="./js/artifacts.js"></script>
</body>
</html>
