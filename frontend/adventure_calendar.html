<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Log - Agentic Personal Porter</title>
    <link href="./css/style.css" rel="stylesheet">
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .day-cell {
            min-height: 100px;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">
    <!-- Navbar -->
    {% include 'components/navbar.html' %}

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4">
        <div class="bg-surface p-6 rounded-2xl max-w-7xl mx-auto shadow-md border border-border">
            <!-- Calendar Header & Selection -->
            <div class="flex flex-col md:flex-row justify-between md:items-end mb-6 gap-4">
                <div>
                    <h2 class="text-3xl font-extrabold text-main" id="calendar-title">Loading...</h2>
                    <p class="text-muted italic mt-1">Review your historical logs, track progress, and plan the future.</p>
                </div>
                <!-- Controls -->
                <div class="flex items-center gap-3">
                    <button id="today-btn" class="bg-primary hover:bg-primary-hover text-on-primary font-bold py-2 px-4 rounded transition-colors text-sm shadow-sm hidden md:block">Today</button>
                    <button id="prev-month-btn" aria-label="Previous month" class="bg-surface hover:bg-surface-hover border border-border text-main font-bold py-2 px-4 rounded transition-colors text-sm shadow-sm">◀</button>
                    <button id="next-month-btn" aria-label="Next month" class="bg-surface hover:bg-surface-hover border border-border text-main font-bold py-2 px-4 rounded transition-colors text-sm shadow-sm">▶</button>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loading-spinner" class="text-center py-12 hidden">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
                <p class="mt-4 text-muted font-medium tracking-widest uppercase text-sm">Syncing with Temporal Grid...</p>
            </div>

            <!-- The Grid of a Single Month -->
            <div>
                <!-- Static headers -->
                <div class="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-muted text-sm tracking-wider uppercase">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <!-- Dynamic Day Cells -->
                <div id="monthly-grid-container" class="grid grid-cols-7 gap-2 auto-rows-[minmax(120px,auto)]">
                    <!-- Rendered heavily via JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Detailed Day View -->
    <div id="day-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-lg w-full transform scale-95 transition-transform" id="day-modal-content">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-2xl font-bold text-gray-800" id="modal-date-title">Date</h3>
                <button id="close-modal-btn" aria-label="Close" class="text-gray-400 hover:text-red-500 text-2xl font-bold">&times;</button>
            </div>
            <div id="modal-body" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                <!-- Day details dynamically injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/auth.js"></script>
    <script src="./js/adventure_calendar.js"></script>
</body>
</html>
