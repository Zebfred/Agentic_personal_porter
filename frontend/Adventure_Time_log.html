<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life's Adventure Time log - Weekly Planner</title>
    <link href="./css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">
    <!-- Navbar -->
    {% include 'components/navbar.html' %}

    <div class="container mx-auto p-4">
        <!-- Monthly History Calendar Overlay -->
        <div id="monthly-history-calendar" class="max-w-4xl mx-auto mb-8 bg-white p-6 rounded-2xl shadow-md border border-gray-100 hidden lg:block">
            <div class="flex justify-between items-center mb-6">
                <button id="prev-month-btn" aria-label="Previous month" class="text-gray-500 hover:text-blue-600 transition text-2xl font-bold px-4 py-2">&lt;</button>
                <div class="text-center">
                    <h2 id="current-month-header" class="text-2xl font-extrabold text-gray-800 tracking-tight">Loading...</h2>
                    <p class="text-xs text-gray-500 font-medium tracking-widest uppercase mt-1">Historical Log Navigation</p>
                </div>
                <button id="next-month-btn" aria-label="Next month" class="text-gray-500 hover:text-blue-600 transition text-2xl font-bold px-4 py-2">&gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-gray-500 text-sm tracking-wider uppercase">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-2">
                <!-- JS Populates this -->
            </div>
            <div class="mt-4 flex justify-end gap-2 text-xs text-gray-400 font-bold">
                <button id="reset-current-week-btn" class="hover:text-blue-500 transition px-2 py-1 rounded bg-blue-50 text-blue-600 hidden">Return to Current Week</button>
            </div>
        </div>

        <div class="text-center mb-2">
            <span id="active-week-label" class="inline-block bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider">Current Local Week</span>
        </div>
        <!-- Day of the week navigation -->
        <div id="day-nav" class="flex flex-wrap justify-center space-x-2 mb-4">
            <button data-day="monday" class="day-btn px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">Monday</button>
            <button data-day="tuesday" class="day-btn px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">Tuesday</button>
            <button data-day="wednesday" class="day-btn px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">Wednesday</button>
            <button data-day="thursday" class="day-btn px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">Thursday</button>
            <button data-day="friday" class="day-btn px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">Friday</button>
            <button data-day="saturday" class="day-btn px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">Saturday</button>
            <button data-day="sunday" class="day-btn px-4 py-2 rounded-lg bg-gray-300 hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">Sunday</button>
        </div>

        <h2 id="current-day-header" class="text-3xl font-bold text-center mb-4">Loading...</h2>
        
        <div class="flex justify-center gap-4 mb-6">
            <button id="sync-cal-btn" class="bg-green-500 hover:bg-green-600 text-black font-bold py-2 px-6 rounded-full shadow-md transition transform hover:-translate-y-0.5 active:scale-95 text-sm">
                📅 Sync Calendar
            </button>
            <button id="daily-reflection-btn" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-black font-bold py-2 px-6 rounded-full shadow-lg transition transform hover:-translate-y-0.5 active:scale-95 text-sm flex items-center gap-2">
                <span>✨</span> Generate Daily Reflection
            </button>
        </div>

        <!-- Sovereign Daily Insight Widget -->
        <div id="daily-reflection-container" class="hidden max-w-4xl mx-auto mb-8 animate-in fade-in duration-700">
            <div class="glass-panel p-6 rounded-2xl border-l-8 border-l-purple-500 shadow-xl bg-gradient-to-br from-white to-purple-50/30">
                <h3 class="text-xl font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <span class="text-2xl">🔮</span> Sovereign Daily Insight
                </h3>
                <div id="daily-reflection-content" class="text-gray-700 leading-relaxed italic text-lg">
                    <!-- Reflection will be injected here -->
                </div>
            </div>
        </div>

        <!-- Container for the selected day's log -->
        <div id="day-view-container" class="space-y-6">
            <!-- Time chunk cards will be dynamically inserted here by app.js -->
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
