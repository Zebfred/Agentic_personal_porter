<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agentic Personal Porter</title>
    <link href="./css/style.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen relative overflow-hidden font-sans">
    <!-- Decorative background blobs -->
    <div class="absolute w-full h-full inset-0 z-0">
        <div class="absolute top-[20%] left-[20%] w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob"></div>
        <div class="absolute top-[20%] right-[20%] w-72 h-72 bg-yellow-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-[40%] w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-4000"></div>
    </div>

    <div class="z-10 w-full max-w-md p-6">
        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 text-white mb-4 shadow-lg">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="text-3xl font-black text-gray-800 tracking-tight">Agentic Porter</h1>
                <p class="text-gray-500 mt-2 font-medium">Authenticate to access the graph.</p>
            </div>

            <div id="error-message" class="hidden transform transition-all bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded text-sm font-medium mb-6">
                Authentication failed or server offline.
            </div>
            
            <div class="flex flex-col items-center justify-center mt-6 min-h-[40px] gap-4">
                <!-- We will programmatically inject the Google Sign-In button here
                     once we fetch the GOOGLE_CLIENT_ID from the backend config. -->
                <div id="google-btn-container"></div>
            </div>
            
            <div class="mt-6">
                <p class="text-center text-sm text-gray-500">
                    Welcome to the home of your Agentic Personal Porter, Hero. Sign in to enter the Nexus. 
                </p>
            </div>

            <p class="text-center text-xs text-gray-400 mt-8 font-medium">Session secured by Porter Auth Engine (Google OAuth)</p>
            <p class="text-center text-xs text-gray-400 mt-2 font-bold tracking-wider uppercase">A Nexus DS/ML Consulting Deployment</p>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script>
        let oauthClient;

        async function loadGoogleClientId() {
            try {
                const response = await fetch('/api/config');
                if (response.ok) {
                    const data = await response.json();
                    if (data.google_client_id && window.google) {
                        oauthClient = google.accounts.oauth2.initCodeClient({
                            client_id: data.google_client_id,
                            scope: 'openid email profile https://www.googleapis.com/auth/calendar',
                            ux_mode: 'popup',
                            callback: handleGoogleAuthCode
                        });
                        
                        // Render a custom button since initCodeClient doesn't provide renderButton
                        const container = document.getElementById('google-btn-container');
                        container.innerHTML = `
                            <button onclick="oauthClient.requestCode()" class="flex items-center gap-3 bg-white border border-gray-300 rounded-lg px-6 py-3 shadow-sm hover:bg-gray-50 transition w-full justify-center text-gray-700 font-medium">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                                Sign in with Google
                            </button>
                        `;
                    } else {
                        console.error('Google Client ID not found in config');
                    }
                }
            } catch (err) {
                console.error('Could not load Google Client ID config dynamically.', err);
            }
        }
        
        loadGoogleClientId();

        async function handleGoogleAuthCode(response) {
            const errorMsg = document.getElementById('error-message');
            errorMsg.classList.add('hidden');
            
            if (response.error) {
                errorMsg.textContent = response.error;
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                // Send the authorization code to the backend
                const apiResponse = await fetch('/api/login/code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: response.code })
                });
                
                const data = await apiResponse.json();
                
                if (apiResponse.ok && data.token) {
                    Auth.setToken(data.token);
                    sessionStorage.setItem('porter_role', data.role);
                    sessionStorage.setItem('porter_account_type', data.account_type);
                    
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (err) {
                errorMsg.textContent = err.message || 'Connection error';
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
